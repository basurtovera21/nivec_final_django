{% extends "base.html" %}
{% block titulo %}Iniciar sesión - NIVEC{% endblock %}

{% block contenido %}
<div style="max-width: 380px; margin: 60px auto;">
    <div class="tarjeta">
        <h2 style="text-align:center; border:none; font-size:18px; margin-bottom:20px;">NIVEC</h2>
        <form method="post">
            {% csrf_token %}
            <div class="campo">
                <label>CORREO INSTITUCIONAL</label>
                <input type="email" name="correo_institucional" autocomplete="username" spellcheck="false" required autofocus>
            </div>
            <div class="campo">
                <label>CONTRASEÑA</label>
                <input type="password" name="contrasena" autocomplete="current-password" required>
            </div>
            <button type="submit" class="boton boton-primario" style="width:100%; margin-top:8px;">
                Ingresar
            </button>
        </form>
    </div>
</div>
{% endblock %}
